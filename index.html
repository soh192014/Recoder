<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quantum Cipher 3.1</title>

<style>

:root{
    --blue:#00f7ff;
    --amber:#ffb300;
    --bg:#070b12;
    --panel:#111827;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:var(--bg);
    font-family:"Segoe UI",monospace;
    color:white;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Matrix Background */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        0deg,
        rgba(0,255,100,0.03) 0px,
        rgba(0,255,100,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    animation:matrixMove 15s linear infinite;
    z-index:-1;
}

@keyframes matrixMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(120px);
    }
}

.container{
    width:95%;
    max-width:1100px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.panel{
    background:rgba(17,24,39,0.85);
    border-radius:24px;
    padding:28px;
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:0 0 30px rgba(0,0,0,0.45);
}

/* Encoder */

.encoder{
    border-top:4px solid var(--blue);
}

/* Decoder */

.decoder{
    border-top:4px solid var(--amber);
}

.title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:22px;
    font-size:1.5rem;
    letter-spacing:2px;
}

.encoder .title{
    color:var(--blue);
    text-shadow:0 0 12px var(--blue);
}

.decoder .title{
    color:var(--amber);
    text-shadow:0 0 12px var(--amber);
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:10px;
    color:#9ca3af;
    font-size:0.8rem;
    text-transform:uppercase;
}

textarea{
    width:100%;
    min-height:130px;
    resize:none;
    border:none;
    outline:none;
    border-radius:16px;
    background:#000;
    color:white;
    padding:16px;
    font-size:1rem;
    font-family:monospace;
    border:1px solid #222;
    transition:0.25s;
}

.encoder textarea:focus{
    border-color:var(--blue);
    box-shadow:0 0 18px rgba(0,247,255,0.35);
}

.decoder textarea:focus{
    border-color:var(--amber);
    box-shadow:0 0 18px rgba(255,179,0,0.35);
}

/* Factor Buttons */

.factor-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.factor-btn{
    flex:1;
    min-width:60px;
    border:none;
    border-radius:14px;
    padding:12px;
    background:#1f2937;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.25s;
}

.factor-btn:hover{
    transform:translateY(-3px);
}

.encoder .factor-btn.active{
    background:var(--blue);
    color:black;
    box-shadow:0 0 18px var(--blue);
}

.decoder .factor-btn.active{
    background:var(--amber);
    color:black;
    box-shadow:0 0 18px var(--amber);
}

/* Output */

.output{
    margin-top:18px;
    background:black;
    border-radius:16px;
    padding:16px;
    min-height:130px;
    border:1px dashed #333;
    word-break:break-all;
    font-size:1.1rem;
}

/* Buttons */

.action-btn{
    margin-top:16px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-weight:bold;
    transition:0.25s;
}

.encoder .action-btn{
    background:var(--blue);
    color:black;
}

.decoder .action-btn{
    background:var(--amber);
    color:black;
}

.action-btn:hover{
    transform:scale(1.02);
}

/* Auto Decode */

.auto-box{
    margin-top:16px;
    display:flex;
    align-items:center;
    gap:10px;
    color:#aaa;
    font-size:0.9rem;
}

input[type="checkbox"]{
    transform:scale(1.3);
    accent-color:var(--amber);
}

/* Hint */

.hint{
    margin-top:18px;
    color:#666;
    font-size:0.75rem;
    line-height:1.5;
}

/* Status */

.status{
    margin-top:10px;
    color:#00ff99;
    font-size:0.8rem;
}

/* Responsive */

@media(max-width:850px){

    body{
        padding:20px;
        overflow:auto;
    }

    .container{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- Encoder -->

    <div class="panel encoder">

        <div class="title">
            <span>QUANTUM ENCODER</span>
            <span>加密器</span>
        </div>

        <div class="input-group">
            <label>Original Text</label>

            <textarea
                id="encInput"
                placeholder="输入需要加密的内容..."
            ></textarea>
        </div>

        <div class="input-group">

            <label>Factor</label>

            <div
                class="factor-buttons"
                id="encFactors"
            ></div>

        </div>

        <div
            class="output"
            id="encOutput"
        >
            ---
        </div>

        <button
            class="action-btn"
            onclick="copyText('encOutput')"
        >
            Copy Encrypted Result
        </button>

        <div
            class="status"
            id="encStatus"
        ></div>

    </div>

    <!-- Decoder -->

    <div class="panel decoder">

        <div class="title">
            <span>QUANTUM DECODER</span>
            <span>解密器</span>
        </div>

        <div class="input-group">

            <label>Encrypted Text</label>

            <textarea
                id="decInput"
                placeholder="输入需要解密的内容..."
            ></textarea>

        </div>

        <div class="input-group">

            <label>Factor</label>

            <div
                class="factor-buttons"
                id="decFactors"
            ></div>

        </div>

        <!-- Auto Decode -->

        <div class="auto-box">

            <input
                type="checkbox"
                id="autoDecode"
                checked
            >

            <span>✓ Auto Decode</span>

        </div>

        <div
            class="output"
            id="decOutput"
        >
            ---
        </div>

        <button
            class="action-btn"
            onclick="copyText('decOutput')"
        >
            Copy Decrypted Result
        </button>

        <div
            class="status"
            id="decStatus"
        ></div>

        <div class="hint">

            Quantum Cipher 3.1<br>

            Available reversible factors:
            1 / 3 / 7 / 9

        </div>

    </div>

</div>

<script>

/* =========================
   Quantum Cipher 3.1
========================= */

const validFactors = [1,3,7,9];

let encFactor = 9;
let decFactor = 9;

/* Create Buttons */

function createButtons(containerId,mode){

    const container =
        document.getElementById(containerId);

    validFactors.forEach(factor=>{

        const btn =
            document.createElement("button");

        btn.className = "factor-btn";

        btn.innerText = factor;

        if(factor===9){
            btn.classList.add("active");
        }

        btn.onclick = ()=>{

            container
            .querySelectorAll(".factor-btn")
            .forEach(b=>b.classList.remove("active"));

            btn.classList.add("active");

            if(mode==="enc"){
                encFactor = factor;
            }else{
                decFactor = factor;
            }

            process();

        };

        container.appendChild(btn);

    });

}

createButtons("encFactors","enc");
createButtons("decFactors","dec");

/* Modular Inverse */

function modInverse(a,m){

    for(let x=1;x<m;x++){

        if((a*x)%m===1){
            return x;
        }

    }

    return null;

}

/* Transform */

function transform(text,factor,mode){

    let result = "";

    const alphaMod = 26;
    const numMod = 10;

    const alphaKey =
        mode==="enc"
        ? factor
        : modInverse(factor,alphaMod);

    const numKey =
        mode==="enc"
        ? factor
        : modInverse(factor,numMod);

    for(let char of text){

        /* Letters */

        if(/[a-zA-Z]/.test(char)){

            const isUpper =
                char===char.toUpperCase();

            const base =
                isUpper ? 65 : 97;

            let code =
                char.charCodeAt(0)-base;

            let processed =
                (code*alphaKey)%alphaMod;

            result +=
                String.fromCharCode(processed+base);

        }

        /* Numbers */

        else if(/[0-9]/.test(char)){

            let num =
                parseInt(char);

            let processed =
                (num*numKey)%numMod;

            result +=
                processed.toString();

        }

        /* Other */

        else{

            result += char;

        }

    }

    return result;

}

/* Process */

function process(){

    /* Encrypt */

    const encInput =
        document.getElementById("encInput").value;

    const encResult =
        transform(encInput,encFactor,"enc");

    document.getElementById("encOutput").innerText =
        encResult || "---";

    /* Auto Decode */

    const autoDecode =
        document.getElementById("autoDecode").checked;

    let decInput;

    if(autoDecode){

        decInput = encResult;

        document.getElementById("decInput").value =
            encResult;

    }else{

        decInput =
            document.getElementById("decInput").value;

    }

    /* Decrypt */

    const decResult =
        transform(decInput,decFactor,"dec");

    document.getElementById("decOutput").innerText =
        decResult || "---";

}

/* Input Listener */

document
.getElementById("encInput")
.addEventListener("input",process);

document
.getElementById("decInput")
.addEventListener("input",process);

document
.getElementById("autoDecode")
.addEventListener("change",process);

/* Copy */

function copyText(id){

    const text =
        document.getElementById(id).innerText;

    if(text==="---") return;

    navigator.clipboard.writeText(text);

    const statusId =
        id==="encOutput"
        ? "encStatus"
        : "decStatus";

    document.getElementById(statusId)
    .innerText = "✅ Copied Successfully";

    setTimeout(()=>{

        document.getElementById(statusId)
        .innerText = "";

    },2000);

}

/* Initialize */

process();

</script>

</body>
</html>
