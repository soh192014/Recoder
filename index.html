<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>量子字符转换器 2.0</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-amber: #ffb300;
            --bg-dark: #0a0b10;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(10, 11, 16, 0.9), rgba(10, 11, 16, 0.9)),
                        repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.03) 0px, rgba(0, 255, 0, 0.03) 1px, transparent 1px, transparent 2px);
            z-index: -1;
        }

        .panel {
            background: rgba(20, 25, 40, 0.9);
            padding: 20px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
            border-radius: 4px;
            width: 450px;
            margin-bottom: 20px;
        }

        .panel.decoder {
            border-color: var(--neon-amber);
            box-shadow: 0 0 15px rgba(255, 179, 0, 0.1);
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
        }

        .blue-title { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
        .amber-title { color: var(--neon-amber); text-shadow: 0 0 8px var(--neon-amber); }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            outline: none;
            font-family: monospace;
        }

        .panel.encoder input:focus { border-color: var(--neon-blue); }
        .panel.decoder input:focus { border-color: var(--neon-amber); }

        .output-box {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px dashed #444;
            min-height: 40px;
            word-break: break-all;
            font-size: 1.2rem;
        }

        .hint {
            font-size: 0.65rem;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="matrix-bg"></div>

<div class="panel encoder">
    <h2 class="blue-title"><span>ENCODER</span> <span>位移加密</span></h2>
    <div class="input-group">
        <label>原始明文 / RAW DATA</label>
        <input type="text" id="encInput" placeholder="输入字母或数字...">
    </div>
    <div class="input-group">
        <label>倍率因子 / FACTOR (1-10)</label>
        <input type="range" id="encFactor" min="1" max="10" value="9" oninput="process()">
        <div id="encFactorVal" style="text-align:right; font-size: 0.8rem; color: var(--neon-blue);">Factor: 9</div>
    </div>
    <div class="output-box" id="encOutput">---</div>
</div>

<div class="panel decoder">
    <h2 class="amber-title"><span>DECODER</span> <span>逆向解算</span></h2>
    <div class="input-group">
        <label>加密密文 / ENCRYPTED DATA</label>
        <input type="text" id="decInput" placeholder="输入待还原字符...">
    </div>
    <div class="input-group">
        <label>已知倍率 / KNOWN FACTOR</label>
        <input type="range" id="decFactor" min="1" max="10" value="9" oninput="process()">
        <div id="decFactorVal" style="text-align:right; font-size: 0.8rem; color: var(--neon-amber);">Factor: 9</div>
    </div>
    <div class="output-box" id="decOutput" style="color: var(--neon-amber);">---</div>
    <div class="hint">* 注意：如果倍率与进制(26或10)不互质，解码可能产生多解或无法还原。</div>
</div>

<script>
    // 模逆元计算 (用于还原乘法)
    function modInverse(a, m) {
        for (let x = 1; x < m; x++) {
            if (((a % m) * (x % m)) % m == 1) return x;
        }
        return null;
    }

    function transform(text, factor, mode) {
        let result = "";
        const m_alpha = 26;
        const m_num = 10;

        // 如果是解码，尝试获取模逆元
        let inv_alpha = mode === 'dec' ? modInverse(factor, m_alpha) : factor;
        let inv_num = mode === 'dec' ? modInverse(factor, m_num) : factor;

        for (let char of text) {
            if (/[a-zA-Z]/.test(char)) {
                let isUpper = char === char.toUpperCase();
                let base = isUpper ? 65 : 97;
                let code = char.charCodeAt(0) - base;
                
                let processed;
                if (mode === 'enc') {
                    processed = (code * factor) % m_alpha;
                } else {
                    processed = inv_alpha !== null ? (code * inv_alpha) % m_alpha : code;
                }
                result += String.fromCharCode(processed + base);
            } 
            else if (/[0-9]/.test(char)) {
                let num = parseInt(char);
                let processed;
                if (mode === 'enc') {
                    processed = (num * factor) % m_num;
                } else {
                    processed = inv_num !== null ? (num * inv_num) % m_num : num;
                }
                result += processed.toString();
            } else {
                result += char;
            }
        }
        return result;
    }

    function process() {
        // 更新 UI 数值
        const ef = document.getElementById('encFactor').value;
        const df = document.getElementById('decFactor').value;
        document.getElementById('encFactorVal').innerText = "Factor: " + ef;
        document.getElementById('decFactorVal').innerText = "Factor: " + df;

        // 执行计算
        const encIn = document.getElementById('encInput').value;
        document.getElementById('encOutput').innerText = transform(encIn, parseInt(ef), 'enc') || "---";

        const decIn = document.getElementById('decInput').value;
        document.getElementById('decOutput').innerText = transform(decIn, parseInt(df), 'dec') || "---";
    }

    document.getElementById('encInput').addEventListener('input', process);
    document.getElementById('decInput').addEventListener('input', process);

    // 初始化执行一次
    process();
</script>

</body>
</html>
